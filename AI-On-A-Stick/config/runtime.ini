# Paths are relative to the USB root.
# Manual overrides are optional when auto_profile=true.
llama_binary=
model_path=

# Bundled per-platform llama.cpp binaries.
binary_macos_arm64=bin/macos-arm64/llama-server
binary_macos_x64=bin/macos-x64/llama-server
binary_linux_x64=bin/linux-x64/llama-server
binary_linux_arm64=bin/linux-arm64/llama-server
binary_windows_x64=bin/windows-x64/llama-server.exe

# Bundled model tiers.
model_small_path=models/small/model.gguf
model_medium_path=models/medium/model.gguf
model_large_path=models/large/model.gguf
model_coder_path=models/coder/model.gguf

# Local service ports.
llama_host=127.0.0.1
llama_port=8080
coder_llama_port=8081
app_port=8090

# Runtime tuning.
# When enabled, host hardware picks binary/model/context/parallelism automatically.
auto_profile=true
prefer_gpu=true
context_size=4096
# Controls llama.cpp request slot concurrency.
parallel_slots=2
# Set > 0 to offload layers when GPU is available.
gpu_layers=0
coder_context_size=8192
coder_parallel_slots=2
# Use -1 to inherit the selected general runtime GPU offload value.
coder_gpu_layers=-1
auto_start_llama=false
auto_open_browser=true

# Semicolon-separated host paths to index on startup.
scan_paths=
